 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pasiya Max AI Login</title>

<link rel="stylesheet" href="style.css">

<style>

body{
margin:0;
padding:0;
background:#0d1117;
font-family:Arial,sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.login-box{
width:380px;
background:#161b22;
padding:30px;
border-radius:15px;
box-shadow:0 0 20px rgba(0,0,0,.5);
}

h1{
text-align:center;
margin-bottom:10px;
}

p{
text-align:center;
color:#bdbdbd;
margin-bottom:25px;
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
border:none;
border-radius:8px;
font-size:16px;
background:#0d1117;
color:white;
}

button{
width:100%;
padding:12px;
background:#00c896;
border:none;
border-radius:8px;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#00a97f;
}

.footer{
margin-top:20px;
text-align:center;
font-size:14px;
color:#888;
}

</style>

</head>

<body>

<div class="login-box">

<h1>🔐 PASIYA MAX AI</h1>

<p>Login To Your AI Dashboard</p>

<input
id="email"
type="email"
placeholder="Enter Email">

<input
id="password"
type="password"
placeholder="Enter Password">

<button id="loginBtn">

Login

</button>

<div class="footer">

Pasiya Max AI OS v1.0

 </div>

<script type="module" src="firebase-config.js"></script>
<script type="module" src="app.js"></script>

</body>
</html>
