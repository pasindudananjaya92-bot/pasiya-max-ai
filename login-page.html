 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pasiya Max AI Login</title>

<style>

body{
margin:0;
padding:0;
font-family:Arial,sans-serif;
background:#0d1117;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.login-box{
width:350px;
background:#161b22;
padding:30px;
border-radius:15px;
box-shadow:0 0 20px rgba(0,0,0,.5);
}

h2{
text-align:center;
margin-bottom:25px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
font-size:16px;
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:8px;
background:#00c896;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#00a97f;
}

p{
text-align:center;
margin-top:20px;
font-size:14px;
color:#aaa;
}

</style>

</head>

<body>

<div class="login-box">

<h2>🔐 Pasiya Max AI Login</h2>

<input type="email" placeholder="Email">

<input type="password" placeholder="Password">

<button>Login</button>

<p>Pasiya Max AI OS v1.0</p>

</div>

</body>

</html>
