 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pasiya Max AI Assistant</title>

<style>

body{
background:#0d1117;
font-family:Arial,sans-serif;
color:white;
margin:0;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
}

.card{
background:#161b22;
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

textarea{
width:100%;
height:180px;
padding:15px;
border:none;
border-radius:10px;
font-size:16px;
}

button{
margin-top:15px;
padding:12px 25px;
background:#00c896;
color:white;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

.status{
background:#0f5132;
padding:12px;
border-radius:10px;
margin-top:15px;
font-weight:bold;
}

.commands{
margin-top:20px;
}

.commands ul{
line-height:2;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<h1>🤖 PASIYA MAX AI ASSISTANT</h1>

<p>Welcome to your AI Control Center.</p>

<div class="status">

🟢 AI STATUS : ONLINE

</div>

</div>

<div class="card">

<h2>AI Prompt</h2>

<textarea placeholder="Type your request here..."></textarea>

<button>Send to AI</button>

</div>

<div class="card">

<h2>Quick Commands</h2>

<div class="commands">

<ul>

<li>📝 Write Blog Article</li>

<li>📸 Create Social Media Post</li>

<li>🎨 Generate Image</li>

<li>🎥 Create Video</li>

<li>📅 Schedule Posts</li>

<li>📊 View Analytics</li>

<li>🌐 Manage Website</li>

<li>⚙️ Open Settings</li>

</ul>

</div>

</div>

</div>

</body>
</html>
