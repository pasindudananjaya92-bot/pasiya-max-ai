 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pasiya Max AI OS</title>

<link rel="stylesheet" href="assets/css/style.css">
<script defer src="assets/js/app.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
background:#0d1117;
font-family:Arial,sans-serif;
color:white;
}

header{
background:#161b22;
padding:20px;
text-align:center;
font-size:30px;
font-weight:bold;
box-shadow:0 0 20px #000;
}

.container{
width:95%;
max-width:1200px;
margin:auto;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-top:30px;
}

.card{
background:#161b22;
padding:25px;
border-radius:15px;
transition:.3s;
text-align:center;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 0 20px #00ffcc55;
}

button{
margin-top:20px;
padding:12px 25px;
background:#00c896;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
font-size:16px;
}

footer{
margin-top:40px;
padding:20px;
text-align:center;
color:#888;
}
</style>

</head>

<body>

<header>

🤖 PASIYA MAX AI OS

</header>

<h2 align="center">
